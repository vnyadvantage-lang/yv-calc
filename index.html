<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YV Team — Финмотивация</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{max-width:500px;width:100%;padding:2rem 1.5rem;}
h1{font-size:20px;font-weight:600;margin-bottom:6px;}
.sub{font-size:13px;color:#5a6278;margin-bottom:2rem;}
.card{display:block;background:#161b27;border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem;text-decoration:none;color:inherit;transition:border-color 0.15s,background 0.15s;}
.card:hover{background:#1e2535;border-color:rgba(255,255,255,0.15);}
.card-top{display:flex;align-items:center;gap:12px;margin-bottom:6px;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0;}
.card-name{font-size:15px;font-weight:600;}
.card-desc{font-size:12px;color:#8b93a8;}
</style>
</head>
<body>
<div class="wrap">
  <h1>YV Team — Финансовая мотивация</h1>
  <div class="sub">Выберите сотрудника</div>
  <a class="card" href="./lolita/">
    <div class="card-top">
      <div class="avatar" style="background:linear-gradient(135deg,#22c55e,#4f7cff)">Л</div>
      <div class="card-name">Lolita</div>
    </div>
    <div class="card-desc">Менеджер платформы Etsy · Sambanis / Portraithy</div>
  </a>
  <a class="card" href="./serezha/">
    <div class="card-top">
      <div class="avatar" style="background:linear-gradient(135deg,#4f7cff,#f59e0b)">С</div>
      <div class="card-name">Сережа</div>
    </div>
    <div class="card-desc">IT-специалист · Sambanis / Portraithy</div>
  </a>
</div>
</body>
</html>
